<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - Trang Trại Xanh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header với thanh tìm kiếm -->
    <header>
        <div class="container header-content">
            <div class="logo">
                <img src="/images/logo.png" alt="Trang Trại Xanh">
                <div>
                    <span class="logo-text">Trang Trại Xanh</span><br>
                    <small>BIOFARM ENERGY CO., LTD.</small>
                </div>
            </div>
            <div class="company-info">
                <strong>CÔNG TY TNHH TM DV KỸ THUẬT CHĂN NUÔI VÀ NĂNG LƯỢNG</strong><br>
                <span class="highlight">SINH HỌC NÔNG NĂNG XANH</span>
            </div>
            
            <!-- Thanh tìm kiếm -->
            <div class="header-right">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Tìm kiếm sản phẩm..." class="search-input">
                    <button onclick="searchProducts()" class="search-btn">🔍</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Navigation -->
    <nav>
        <div class="container">
            <ul>
                <li><a href="index.html">TRANG CHỦ</a></li>
                <li><a href="products.html">SẢN PHẨM</a></li>
                <li><a href="index.html#about">VỀ CHÚNG TÔI</a></li>
                <li><a href="index.html#contact">LIÊN HỆ</a></li>
            </ul>
        </div>
    </nav>

    <!-- Danh sách sản phẩm -->
    <section class="section">
        <div class="container">
            <h2>DANH MỤC SẢN PHẨM</h2>
            <div id="productGrid" class="product-grid"></div>
        </div>
    </section>

    <!-- Modal Xem Chi Tiết -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">×</span>
            
            <div class="modal-body">
                <!-- Ảnh bên trái -->
                <div class="modal-image">
                    <img id="modalImage" src="" alt="Ảnh sản phẩm">
                </div>
                
                <!-- Nội dung bên phải -->
                <div class="modal-info">
                    <h2 id="modalName"></h2>
                    <p id="modalCategory" class="modal-category"></p>
                    <p id="modalPrice" class="modal-price"></p>
                    <p id="modalDescription" class="modal-desc"></p>
                    
                    <!-- Nút Liên hệ mở Zalo -->
                    <a href="https://zalo.me/0987042718" target="_blank" class="btn-contact-modal">
                        <i class="fas fa-comments"></i> Liên hệ ngay qua Zalo
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/products.js"></script>

</body>
</html>
